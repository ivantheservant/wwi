const CC=['#1a2a4a', '#5a1010', '#0f253a', '#3a2808', '#0a2a28', '#2a1008', '#0a2a10', '#200f3a', '#3a1a5a', '#6a1010', '#3a2060'];

let cur=-1;const blobUrls={};
const groups=[
  {label:'Lessons 1\u20138',ids:['l1','l2','l3','l4','l5','l6','l7','l8']},
  {label:'Resource',ids:['rp']},
  {label:'Assessments',ids:['t1','t2']}
];

function go(id){
  const i=L.findIndex(x=>x.id===id);if(i<0)return;cur=i;
  const fr=document.getElementById('lFrame');
  document.getElementById('welcome').style.display='none';
  fr.style.display='block';
  if(!blobUrls[id]){
    const bytes=atob(L[i].b64);
    const arr=new Uint8Array(bytes.length);
    for(let k=0;k<bytes.length;k++)arr[k]=bytes.charCodeAt(k);
    const blob=new Blob([arr],{type:'text/html;charset=utf-8'});
    blobUrls[id]=URL.createObjectURL(blob);
  }
  fr.src=blobUrls[id];
  document.querySelectorAll('.pill').forEach(p=>p.classList.remove('on'));
  const pEl=document.querySelector('.pill[data-id="'+id+'"]');
  if(pEl){pEl.classList.add('on');pEl.scrollIntoView({inline:'nearest',block:'nearest'});}
  document.getElementById('curName').textContent=L[i].label+' \u2014 '+L[i].name;
  document.getElementById('jumpSel').value=id;
  document.getElementById('prevBtn').disabled=i===0;
  document.getElementById('nextBtn').disabled=i===L.length-1;
}
function prev(){if(cur>0)go(L[cur-1].id);}
function next(){if(cur<L.length-1)go(L[cur+1].id);}

// Build pills
const pRow=document.getElementById('pillRow');
const jSel=document.getElementById('jumpSel');
let prevGrp='';
L.forEach(item=>{
  if(prevGrp&&prevGrp!==item.group){const s=document.createElement('div');s.className='sep';pRow.appendChild(s);}
  prevGrp=item.group;
  const p=document.createElement('button');p.className='pill '+item.group;p.dataset.id=item.id;
  p.textContent=item.label;p.onclick=()=>go(item.id);pRow.appendChild(p);
  const o=document.createElement('option');o.value=item.id;
  o.textContent=item.label+' \u2014 '+item.name;jSel.appendChild(o);
});

// Build welcome screen cards
const wc=document.getElementById('wcContent');
let colorIdx=0;
groups.forEach(grp=>{
  const sh=document.createElement('div');sh.className='wc-section';sh.textContent=grp.label;wc.appendChild(sh);
  const cols=grp.ids.length>=4?'r8':grp.ids.length===2?'r2':'r1';
  const row=document.createElement('div');row.className='wc-row '+cols;wc.appendChild(row);
  grp.ids.forEach(gid=>{
    const item=L.find(x=>x.id===gid);if(!item)return;
    const c=document.createElement('div');c.className='wc-card';
    c.style.background=CC[colorIdx++]||'#243557';
    c.onclick=()=>go(item.id);
    c.innerHTML='<div class="wc-num">'+item.label+'</div><div class="wc-name">'+item.name+'</div>';
    row.appendChild(c);
  });
});
</script>
